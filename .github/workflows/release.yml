name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
          else
            TAG=$(sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' src/Directory.Build.props | head -1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version=$TAG"

      - name: Restore
        run: |
          dotnet restore src/PixelBar.App/PixelBar.App.csproj -r win-x64
          dotnet restore PixelBar.slnx

      - name: Build
        run: dotnet build PixelBar.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.tag }}

      - name: Pack SDK
        run: dotnet pack src/PixelBar.Sdk/PixelBar.Sdk.csproj -c Release --no-build -o artifacts/nupkg -p:Version=${{ steps.version.outputs.tag }}

      - name: Publish PixelBar.App (single-file exe)
        run: >
          dotnet publish src/PixelBar.App/PixelBar.App.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.version.outputs.tag }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableMsixTooling=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish/app

      - name: Publish pixelbar CLI (single-file exe)
        run: >
          dotnet publish src/PixelBar.Cli/PixelBar.Cli.csproj
          -c Release -r win-x64 --self-contained
          -p:Version=${{ steps.version.outputs.tag }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish/cli

      - name: Stage release executables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $v = "${{ steps.version.outputs.tag }}"
          Copy-Item publish/app/PixelBar.App.exe "artifacts/PixelBar.App-v$v-win-x64.exe"
          Copy-Item publish/cli/pixelbar.exe "artifacts/pixelbar-v$v-win-x64.exe"
          Get-ChildItem artifacts -Filter *.exe | Format-Table Name, @{ N = 'MB'; E = { [math]::Round($_.Length / 1MB, 2) } }

      - name: Write release notes
        shell: pwsh
        run: |
          ./.github/scripts/render_release_notes.ps1 `
            -Version "${{ steps.version.outputs.tag }}" `
            -OutputPath artifacts/RELEASE_NOTES.md
          Get-Content artifacts/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/RELEASE_NOTES.md
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/PixelBar.App-v*-win-x64.exe
            artifacts/pixelbar-v*-win-x64.exe
