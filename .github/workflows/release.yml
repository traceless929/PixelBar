name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version=$TAG"

      - name: Restore
        run: dotnet restore PixelBar.slnx

      - name: Build
        run: dotnet build PixelBar.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.tag }}

      - name: Pack SDK
        run: dotnet pack src/PixelBar.Sdk/PixelBar.Sdk.csproj -c Release --no-build -o artifacts/nupkg -p:Version=${{ steps.version.outputs.tag }}

      - name: Publish App (win-x64)
        run: dotnet publish src/PixelBar.App/PixelBar.App.csproj -c Release -r win-x64 --self-contained -o publish/PixelBar.App-win-x64 -p:Version=${{ steps.version.outputs.tag }} --no-restore

      - name: Publish CLI (win-x64)
        run: dotnet publish src/PixelBar.Cli/PixelBar.Cli.csproj -c Release -r win-x64 --self-contained -o publish/PixelBar.Cli-win-x64 -p:Version=${{ steps.version.outputs.tag }} --no-restore

      - name: Create zip archives
        shell: pwsh
        run: |
          Compress-Archive -Path publish/PixelBar.App-win-x64/* -DestinationPath artifacts/PixelBar.App-win-x64.zip -Force
          Compress-Archive -Path publish/PixelBar.Cli-win-x64/* -DestinationPath artifacts/PixelBar.Cli-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/PixelBar.App-win-x64.zip
            artifacts/PixelBar.Cli-win-x64.zip
